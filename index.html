<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sophie Miller Engine</title>

<link rel="icon" href="data:,">

<script src="https://cdn.tailwindcss.com"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCRTw4a_4GsBzxoBICC1PmMB4Ouu0aUyEY",
authDomain:"parasiteseo-4110c.firebaseapp.com",
projectId:"parasiteseo-4110c",
storageBucket:"parasiteseo-4110c.firebasestorage.app",
messagingSenderId:"736679966975",
appId:"1:736679966975:web:7fd130eda8828d9cbfb4ca"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let userUid=null;
let apiKey="";

let keywords=[
"How to Use Advanced Collagen Plus",
"How to Start Collagen Routine",
"How to Mix Collagen Powder",
"Best Collagen Routine Guide",
"Daily Collagen Process Guide",
"Collagen Routine for Skin",
"How to Track Collagen Results",
"Collagen Diet Optimization",
"Collagen Morning Routine",
"Collagen Supplement Guide"
];

const endpoints=[
"https://generativelanguage.googleapis.com/v1/models/",
"https://generativelanguage.googleapis.com/v1beta/models/",
"https://generativelanguage.googleapis.com/v1beta2/models/"
];

const models=[
"gemini-1.5-flash",
"gemini-1.5-pro",
"gemini-1.0-pro",
"gemini-pro"
];

async function init(){

try{

const r=await fetch("/api/key");

if(r.ok){

const data=await r.json();
apiKey=data.key;

setIndicator("api-status","READY","text-emerald-500");

}

}catch(e){

setIndicator("api-status","KEY FAIL","text-red-500");

}

onAuthStateChanged(auth,user=>{

if(user){
userUid=user.uid;
setIndicator("auth-status","OK","text-emerald-500");
}else{
signInAnonymously(auth);
}

});

updateKeywordUI();

}

function setIndicator(id,text,color){

const el=document.getElementById(id);

if(el){
el.innerText=text;
el.className=`text-[10px] font-bold ${color}`;
}

}

async function callAI(prompt){

let lastError="";

for(const endpoint of endpoints){

for(const model of models){

const url=`${endpoint}${model}:generateContent?key=${apiKey}`;

try{

const response=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:prompt}
]
}
],
generationConfig:{
temperature:0.7,
maxOutputTokens:4096
}
})
});

if(response.ok){

const data=await response.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text || "";

}

if(response.status!==404){

const data=await response.json();

throw new Error(data.error?.message || "API error");

}

}catch(e){

lastError=e.message;

}

}

}

throw new Error("All Gemini endpoints failed: "+lastError);

}

window.runAutomation=async()=>{

const count=parseInt(document.getElementById("count").value);

const log=document.getElementById("log");

const btn=document.getElementById("btn");

btn.disabled=true;

for(let i=0;i<count;i++){

if(keywords.length===0) break;

const h1=keywords.splice(Math.floor(Math.random()*keywords.length),1)[0];

const card=document.createElement("div");

card.className="bg-slate-800 p-4 rounded text-xs mb-3";

log.prepend(card);

try{

card.innerHTML=`Generating: ${h1}`;

const article=await callAI(`
Write a 1200 word article.

Title: ${h1}

Voice: Sophie Miller wellness guide.

Return clean HTML.
`);

card.innerHTML+=`<textarea class="hidden" id="a${i}">${article}</textarea>
<button onclick="copyText('a${i}')" class="bg-indigo-600 px-3 py-2 rounded mt-3">
COPY HTML
</button>`;

if(userUid){

await addDoc(
collection(db,"articles"),
{
title:h1,
content:article,
created:serverTimestamp()
}
);

}

updateKeywordUI();

}catch(e){

card.innerHTML+=`<div class="text-red-400">${e.message}</div>`;

}

}

btn.disabled=false;

};

window.copyText=async(id)=>{

const text=document.getElementById(id).value;

await navigator.clipboard.writeText(text);

alert("copied");

};

function updateKeywordUI(){

document.getElementById("kwTotal").innerText=keywords.length;

}

window.onload=init;

</script>

</head>

<body class="bg-slate-950 text-slate-300 p-6">

<div class="max-w-4xl mx-auto grid lg:grid-cols-12 gap-8">

<div class="lg:col-span-5">

<div class="bg-slate-900 p-8 rounded-3xl">

<h1 class="text-white text-3xl font-black mb-6">

Sophie Engine

</h1>

<div class="text-xs mb-6">

<div class="flex justify-between">
<span>API</span>
<span id="api-status">...</span>
</div>

<div class="flex justify-between">
<span>AUTH</span>
<span id="auth-status">...</span>
</div>

</div>

<input id="count" type="number" value="1"
class="bg-black p-3 w-full rounded mb-4">

<div class="flex justify-between text-xs mb-4">

<span>Keywords</span>
<span id="kwTotal">0</span>

</div>

<button id="btn"
onclick="runAutomation()"
class="w-full bg-indigo-600 py-4 rounded font-bold">

START

</button>

</div>

</div>

<div id="log"
class="lg:col-span-7 h-[700px] overflow-y-auto">

</div>

</div>

</body>
</html>
