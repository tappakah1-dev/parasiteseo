<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Miller Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================================
        // [FIREBASE CONFIGURATION]
        // ==========================================================
        const myCustomConfig = {
            apiKey: "AIzaSyCRTw4a_4GsBzxoBICC1PmMB4Ouu0aUyEY",
            authDomain: "parasiteseo-4110c.firebaseapp.com",
            projectId: "parasiteseo-4110c",
            storageBucket: "parasiteseo-4110c.firebasestorage.app",
            messagingSenderId: "736679966975",
            appId: "1:736679966975:web:7fd130eda8828d9cbfb4ca"
        };

        // ==========================================================
        // [KEYWORDS.JS]
        // ==========================================================
        let keywords = [
            "How to Use Advanced Collagen Plus: A Step-by-Step Daily Routine Guide",
            "Step-by-Step: Incorporating Collagen into Your 2026 Skincare Routine",
            "The Morning Glow Process: How to Properly Mix Advanced Collagen Plus",
            "How to Maximize Collagen Absorption: A Visual Walkthrough",
            "A Beginner’s Guide to Starting a Collagen Supplement Routine (Steps Included)",
            "How to Choose the Right Collagen: Comparing Advanced Collagen Plus to the Rest",
            "Step-by-Step Guide: Evaluating Collagen Supplements for Quality and Purity",
            "How to Spot \"Fake\" Collagen: A Checklist for 2026 Shoppers",
            "Process: Transitioning from Standard Protein to Advanced Collagen Plus",
            "How to Calculate Your Daily Collagen Needs (Step-by-Step Formula)",
            "How to Track Your Collagen Results: A 90-Day Skin & Hair Log",
            "Step-by-Step: What to Expect During Your First Month of Collagen",
            "How to Optimize Your Diet for Collagen Production: A Weekly Checklist",
            "The \"Anti-Aging\" Workflow: Pairing Collagen with Your Morning Skincare",
            "How to Fix Brittle Nails: A Step-by-Step Recovery Guide Using Collagen",
            "How to Make Collagen Coffee: The Perfect Advanced Collagen Plus Recipe",
            "Step-by-Step: Creating a Collagen-Infused Pre-Workout Routine",
            "How to Store and Preserve Collagen Potency: A Quick Visual Guide",
            "The Travel Guide: How to Maintain Your Collagen Routine on the Go",
            "Step-by-Step: Adding Collagen to Your Nighttime Wellness Ritual"
        ];

        // ==========================================================
        // [PROMPTS.JS]
        // ==========================================================
        const promptTemplates = [
            {
                name: "Sophie Miller (Wellness Guide)",
                stage1: (h1, productName) => `
ROLE & VOICE
You are Sophie Miller, a 40-year-old practical wellness and beauty guide writing from lived observation and repeated real-world experience.
Your voice is: calm, grounded, factual, empathetic, reflective, human. 

GOAL
Write a 1,400–1,700 word educational guide optimized for ScribeHow and Parasite SEO.
H1 TITLE: ${h1}
PRODUCT: ${productName} (Mention exactly once in bold in para 2).
Include a 7-step integration workflow. Use reflective tone.
                `,
                stage2: (text) => `Format the following text with **bold** headings and clear bullet points. Text: ${text}`,
                stage3: (text) => `Convert this text to clean HTML (h1, h2, p, ul, li, b tags). Ensure a professional layout. Text: ${text}`
            }
        ];

        // --- ENGINE LOGIC ---
        const firebaseConfig = myCustomConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sophie-engine-v2';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;
        let environmentApiKey = "";

        async function init() {
            // Fetch the key from Vercel API Route
            try {
                const response = await fetch('/api/key');
                if (response.ok) {
                    const data = await response.json();
                    if (data.key) {
                        environmentApiKey = data.key;
                        setIndicator('api-status', 'Loaded', 'text-emerald-500');
                    } else {
                        setIndicator('api-status', 'Empty Key', 'text-yellow-500');
                    }
                } else {
                    setIndicator('api-status', 'Route Missing (404)', 'text-red-500');
                }
            } catch (e) {
                setIndicator('api-status', 'Fetch Error', 'text-red-500');
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userUid = user.uid;
                    setIndicator('auth-status', 'Authenticated', 'text-emerald-500');
                } else {
                    signInAnonymously(auth).catch(() => setIndicator('auth-status', 'Auth Failed', 'text-red-500'));
                }
            });
            updateKeywordUI();
        }

        function setIndicator(id, text, colorClass) {
            const el = document.getElementById(id);
            if (el) {
                el.innerText = text;
                el.className = `text-[10px] font-bold uppercase ${colorClass}`;
            }
        }

        async function callAI(prompt) {
            if (!environmentApiKey) throw new Error("API Key not loaded from Vercel.");

            // UPDATED MODEL NAME: gemini-1.5-flash is stable and widely available
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${environmentApiKey}`;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "API Error");
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) {
                    if (i === 4) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        window.copyToClipboard = (elementId) => {
            const text = document.getElementById(elementId).value;
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            const btn = document.querySelector(`[onclick="copyToClipboard('${elementId}')"]`);
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "COPY HTML"; }, 2000);
        };

        window.runAutomation = async () => {
            const count = parseInt(document.getElementById('count').value);
            const pName = document.getElementById('productName').value || "Advanced Collagen Plus";
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');

            if (!count || count <= 0 || !environmentApiKey) return;

            btn.disabled = true;
            log.innerHTML = `<div class="text-indigo-400 animate-pulse font-mono text-xs mb-4">>> SOPHIE ENGINE STARTING...</div>`;

            for (let i = 0; i < count; i++) {
                if (keywords.length === 0) break;
                const h1 = keywords.splice(Math.floor(Math.random() * keywords.length), 1)[0];
                const taskId = `task-${Date.now()}-${i}`;
                const card = document.createElement('div');
                card.className = "bg-slate-800/40 border border-slate-700/50 p-4 rounded-xl mb-4 text-xs font-mono";
                log.prepend(card);

                try {
                    card.innerHTML = `<div class="text-white font-bold mb-2 uppercase text-indigo-400 tracking-tighter">${h1}</div>`;
                    card.innerHTML += `<div class="flex justify-between"><span>Generating...</span><span id="s1-${i}">⏳</span></div>`;
                    const s1 = await callAI(promptTemplates[0].stage1(h1, pName));
                    document.getElementById(`s1-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between"><span>Formatting...</span><span id="s2-${i}">⏳</span></div>`;
                    const s2 = await callAI(promptTemplates[0].stage2(s1));
                    document.getElementById(`s2-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between text-emerald-400 font-bold"><span>Completed!</span><span>✅</span></div>`;
                    const finalHtml = await callAI(promptTemplates[0].stage3(s2));

                    if (userUid) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'articles'), {
                            h1, content: finalHtml, createdAt: serverTimestamp()
                        });
                    }

                    card.innerHTML += `
                        <div class="mt-4">
                            <textarea id="${taskId}" class="hidden">${finalHtml}</textarea>
                            <button onclick="copyToClipboard('${taskId}')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-lg text-[10px]">COPY HTML</button>
                        </div>
                    `;
                    updateKeywordUI();
                } catch (e) {
                    card.innerHTML += `<div class="text-red-500 mt-2 font-bold uppercase">!! ERROR: ${e.message}</div>`;
                }
            }
            btn.disabled = false;
        }

        function updateKeywordUI() {
            document.getElementById('kwTotal').innerText = keywords.length;
        }

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-400 min-h-screen p-6">

    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl">
                <h1 class="text-white text-3xl font-black mb-6 italic uppercase tracking-tighter">Sophie <span class="text-indigo-500 tracking-normal">Miller</span></h1>
                
                <div class="flex flex-col gap-1 mb-6">
                    <div class="flex justify-between bg-black/40 px-3 py-1 rounded border border-slate-800">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Vercel API:</span>
                        <span id="api-status">Syncing...</span>
                    </div>
                    <div class="flex justify-between bg-black/40 px-3 py-1 rounded border border-slate-800">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Auth:</span>
                        <span id="auth-status">Syncing...</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Batch Count</label>
                        <input type="number" id="count" value="1" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                    </div>
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Product Name</label>
                        <input type="text" id="productName" value="Advanced Collagen Plus" class="bg-transparent text-base font-bold text-indigo-400 w-full outline-none">
                    </div>
                    <div class="flex justify-between items-center py-2 text-xs">
                        <span>Keywords Left:</span>
                        <span id="kwTotal" class="text-white font-black mono">0</span>
                    </div>
                    <button id="btn" onclick="runAutomation()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-xl uppercase tracking-widest text-xs">Start Generation</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div id="log" class="h-[650px] overflow-y-auto custom-scroll pr-2 space-y-4">
                <div class="flex flex-col items-center justify-center h-full text-slate-800 italic text-sm">Awaiting task list...</div>
            </div>
        </div>
    </div>

</body>
</html>
