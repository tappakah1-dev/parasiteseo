<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Miller Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================================
        // [ФАЙЛ: KEYWORDS.JS] — Список твоих H1
        // ==========================================================
        let keywords = [
            "How to Use Advanced Collagen Plus: A Step-by-Step Daily Routine Guide",
            "Step-by-Step: Incorporating Collagen into Your 2026 Skincare Routine",
            "The Morning Glow Process: How to Properly Mix Advanced Collagen Plus",
            "How to Maximize Collagen Absorption: A Visual Walkthrough",
            "A Beginner’s Guide to Starting a Collagen Supplement Routine (Steps Included)",
            "How to Choose the Right Collagen: Comparing Advanced Collagen Plus to the Rest",
            "Step-by-Step Guide: Evaluating Collagen Supplements for Quality and Purity",
            "How to Spot \"Fake\" Collagen: A Checklist for 2026 Shoppers",
            "Process: Transitioning from Standard Protein to Advanced Collagen Plus",
            "How to Calculate Your Daily Collagen Needs (Step-by-Step Formula)",
            "How to Track Your Collagen Results: A 90-Day Skin & Hair Log",
            "Step-by-Step: What to Expect During Your First Month of Collagen",
            "How to Optimize Your Diet for Collagen Production: A Weekly Checklist",
            "The \"Anti-Aging\" Workflow: Pairing Collagen with Your Morning Skincare",
            "How to Fix Brittle Nails: A Step-by-Step Recovery Guide Using Collagen",
            "How to Make Collagen Coffee: The Perfect Advanced Collagen Plus Recipe",
            "Step-by-Step: Creating a Collagen-Infused Pre-Workout Routine",
            "How to Store and Preserve Collagen Potency: A Quick Visual Guide",
            "The Travel Guide: How to Maintain Your Collagen Routine on the Go",
            "Step-by-Step: Adding Collagen to Your Nighttime Wellness Ritual"
        ];

        // ==========================================================
        // [ФАЙЛ: APIS.JS] — Список твоих эндпоинтов
        // ==========================================================
        const apiEndpoints = [
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent",
        ];

        // ==========================================================
        // [ФАЙЛ: PROMPTS.JS] — Полный промпт Sophie Miller
        // ==========================================================
        const promptTemplates = [
            {
                name: "Sophie Miller (Wellness Guide)",
                stage1: (h1, productName) => `
ROLE & VOICE
You are Sophie Miller, a 40-year-old practical wellness and beauty guide writing from lived observation and repeated real-world experience.
Your voice is: calm, grounded, factual, empathetic, reflective, human. 
You never sound: promotional, sales-driven, exaggerated, persuasive.

Occasionally include subtle observational phrases such as:
"I’ve noticed over the years…", "From what I’ve seen in practice…", "One thing that often surprises people is…", "Over time, some patterns start to appear…"

GOAL
Write a 1,400–1,700 word educational guide optimized for ScribeHow and Parasite SEO.
The article must feel: native to the platform, instructional, thoughtful, written for humans first.
Avoid obvious SEO structure patterns. Use curly quotation marks (“ ”).

H1 TITLE
${h1}
(Use this H1 verbatim).

PRODUCT REFERENCE
${productName}
Rules:
- Mention exactly once in the entire article
- The mention must be in **bold**
- Place it naturally in the introduction (preferably paragraph 2)
- Reference it neutrally as an example of a supplement some people explore
- No endorsement, no urgency, no recommendation, no links.

CORE WRITING PRINCIPLES
- Human Variance: Vary sentence length.
- Narrative Naturalness: Reflective paragraphs (3-5 sentences max).
- Anti-Hype: No medical claims, no promises. Avoid "In conclusion", "Furthermore".
- Grounded Authority: Favor lived observation.

INTRODUCTION (180–220 words)
- Para 1: Context & Relatability (Aging/Maintenance).
- Para 2: Expectation Setting. Mention **${productName}** here neutrally.

STRUCTURE
- Internally select ONE primary structural lens (observational, habit-driven, biological, etc.)
- Design unique H2 structure (5–6 H2 sections total).
- MANDATORY H2: One H2 must present a 7-step daily integration workflow presented as a real-life scenario.
- CONTENT: Explore themes like structural proteins, natural production, supporting nutrients (Vit C, Zinc), timing, and lifestyle anchors.

KEY TAKEAWAYS
- 5–6 concise bullet points focused on realism.

FAQ SECTION
- 5–7 realistic questions (3–4 sentences each).
                `,
                stage2: (text) => `Rewrite the following text but make sure that EVERY H1, H2, and H3 header is formatted as **BOLD**. Do not change the wording of the article. Text: ${text}`,
                stage3: (text) => `Perform a final human-readability check. Ensure curly quotes are used throughout. Ensure the tone is calm and empathetic. Ensure ${text.includes('**') ? 'bold headers are preserved' : ''}. Text: ${text}`
            }
        ];

        // --- ЛОГИКА ---
        const firebaseConfig = JSON.parse(__firebase_config || "{}");
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sophie-engine-v2';
        const apiKey = ""; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;

        async function init() {
            try {
                const res = await signInAnonymously(auth);
                userUid = res.user.uid;
                updateKeywordUI();
            } catch(e) { console.error("Firebase fail"); }
        }

        async function callAI(prompt) {
            const endpoint = apiEndpoints[Math.floor(Math.random() * apiEndpoints.length)];
            const url = `${endpoint}?key=${apiKey}`;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("API Error");
        }

        function downloadTxt(filename, text) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        window.runAutomation = async () => {
            const count = parseInt(document.getElementById('count').value);
            const pName = document.getElementById('productName').value || "Advanced Collagen Plus";
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');

            if (!count || count <= 0) return;

            btn.disabled = true;
            log.innerHTML = `<div class="text-indigo-400 animate-pulse font-mono text-sm mb-4">>> SOPHIE ENGINE ACTIVATED...</div>`;

            for (let i = 0; i < count; i++) {
                if (keywords.length === 0) break;

                const h1 = keywords.splice(Math.floor(Math.random() * keywords.length), 1)[0];
                const activePrompt = promptTemplates[0];
                
                const card = document.createElement('div');
                card.className = "bg-slate-800/40 border border-slate-700/50 p-4 rounded-xl mb-4 text-xs font-mono";
                log.prepend(card);

                try {
                    card.innerHTML = `<div class="text-white font-bold mb-2 uppercase tracking-widest text-[10px] text-indigo-400">Task ${i+1}: ${h1}</div>`;
                    
                    card.innerHTML += `<div class="flex justify-between"><span>Generating Narrative (1500w)...</span><span id="s1-${i}">⏳</span></div>`;
                    const s1 = await callAI(activePrompt.stage1(h1, pName));
                    document.getElementById(`s1-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between"><span>Bold Headers Formatting...</span><span id="s2-${i}">⏳</span></div>`;
                    const s2 = await callAI(activePrompt.stage2(s1));
                    document.getElementById(`s2-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between"><span>Final Humanizing...</span><span id="s3-${i}">⏳</span></div>`;
                    const final = await callAI(activePrompt.stage3(s2));
                    document.getElementById(`s3-${i}`).innerText = "✅";

                    // Storage
                    if (userUid) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'articles'), {
                            h1, content: final, createdAt: serverTimestamp()
                        });
                    }
                    downloadTxt(`${h1.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.txt`, final);
                    
                    card.innerHTML += `<div class="mt-2 text-emerald-400 font-bold tracking-tighter uppercase italic">>> COMPLETED: FILE_DOWNLOADED</div>`;
                    updateKeywordUI();
                } catch (e) {
                    card.innerHTML += `<div class="text-red-500 mt-2">!! CRITICAL_ERROR: ${e.message}</div>`;
                }
            }
            btn.disabled = false;
        }

        function updateKeywordUI() {
            document.getElementById('kwTotal').innerText = keywords.length;
        }

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-400 min-h-screen p-6">

    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Controls -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-500/10 blur-3xl rounded-full"></div>
                
                <h1 class="text-white text-3xl font-black tracking-tighter mb-8 italic">
                    SOPHIE <span class="text-indigo-500">SYSTEM</span>
                </h1>

                <div class="space-y-4 relative z-10">
                    <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 focus-within:border-indigo-500/50 transition-all">
                        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-2 block">Количество итераций</label>
                        <input type="number" id="count" value="1" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>

                    <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 focus-within:border-indigo-500/50 transition-all">
                        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-2 block">Product (Mention once in bold)</label>
                        <input type="text" id="productName" value="Advanced Collagen Plus" class="bg-transparent text-lg font-bold text-indigo-400 w-full outline-none">
                    </div>

                    <div class="flex justify-between items-center py-4 border-y border-slate-800/30">
                        <span class="text-xs font-medium text-slate-500">H1 в очереди:</span>
                        <span id="kwTotal" class="text-2xl font-black text-white mono tracking-tighter">0</span>
                    </div>

                    <button id="btn" onclick="runAutomation()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-6 rounded-2xl transition-all active:scale-[0.97] shadow-2xl shadow-indigo-900/40 flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                        Начать генерацию
                    </button>
                </div>
            </div>

            <div class="p-6 bg-slate-900/50 border border-slate-800 rounded-2xl">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                    <h4 class="text-white text-[10px] font-bold uppercase tracking-widest">Persona: Sophie Miller</h4>
                </div>
                <p class="text-[11px] leading-relaxed text-slate-500">
                    40yo practical wellness guide. Calm, empathetic voice. 1.4k-1.7k words. Focus on mobile-first formatting and natural typography.
                </p>
            </div>
        </div>

        <!-- Logs -->
        <div class="lg:col-span-7">
            <div class="flex items-center justify-between mb-4 px-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Production Pipeline</h2>
                </div>
                <span class="text-[9px] mono text-slate-600">V2.0.4_BETA</span>
            </div>
            
            <div id="log" class="h-[650px] overflow-y-auto custom-scroll pr-2 space-y-4">
                <!-- Items -->
                <div class="flex flex-col items-center justify-center h-full text-slate-800 select-none">
                    <div class="w-16 h-16 border-4 border-slate-900 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                    <span class="mono text-[10px] uppercase tracking-widest">Ready to process H1 list...</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
