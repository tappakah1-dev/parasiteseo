<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Miller Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================================
        // [FIREBASE CONFIGURATION]
        // ==========================================================
        const myCustomConfig = {
            apiKey: "AIzaSyCRTw4a_4GsBzxoBICC1PmMB4Ouu0aUyEY",
            authDomain: "parasiteseo-4110c.firebaseapp.com",
            projectId: "parasiteseo-4110c",
            storageBucket: "parasiteseo-4110c.firebasestorage.app",
            messagingSenderId: "736679966975",
            appId: "1:736679966975:web:7fd130eda8828d9cbfb4ca"
        };

        // ==========================================================
        // [KEYWORDS.JS] — List of your H1 Titles
        // ==========================================================
        let keywords = [
            "How to Use Advanced Collagen Plus: A Step-by-Step Daily Routine Guide",
            "Step-by-Step: Incorporating Collagen into Your 2026 Skincare Routine",
            "The Morning Glow Process: How to Properly Mix Advanced Collagen Plus",
            "How to Maximize Collagen Absorption: A Visual Walkthrough",
            "A Beginner’s Guide to Starting a Collagen Supplement Routine (Steps Included)",
            "How to Choose the Right Collagen: Comparing Advanced Collagen Plus to the Rest",
            "Step-by-Step Guide: Evaluating Collagen Supplements for Quality and Purity",
            "How to Spot \"Fake\" Collagen: A Checklist for 2026 Shoppers",
            "Process: Transitioning from Standard Protein to Advanced Collagen Plus",
            "How to Calculate Your Daily Collagen Needs (Step-by-Step Formula)",
            "How to Track Your Collagen Results: A 90-Day Skin & Hair Log",
            "Step-by-Step: What to Expect During Your First Month of Collagen",
            "How to Optimize Your Diet for Collagen Production: A Weekly Checklist",
            "The \"Anti-Aging\" Workflow: Pairing Collagen with Your Morning Skincare",
            "How to Fix Brittle Nails: A Step-by-Step Recovery Guide Using Collagen",
            "How to Make Collagen Coffee: The Perfect Advanced Collagen Plus Recipe",
            "Step-by-Step: Creating a Collagen-Infused Pre-Workout Routine",
            "How to Store and Preserve Collagen Potency: A Quick Visual Guide",
            "The Travel Guide: How to Maintain Your Collagen Routine on the Go",
            "Step-by-Step: Adding Collagen to Your Nighttime Wellness Ritual"
        ];

        // ==========================================================
        // [APIS.JS] — API Endpoints (Gemini)
        // ==========================================================
        const apiEndpoints = [
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent",
        ];

        // ==========================================================
        // [PROMPTS.JS] — Persona and Generation Stages
        // ==========================================================
        const promptTemplates = [
            {
                name: "Sophie Miller (Wellness Guide)",
                stage1: (h1, productName) => `
ROLE & VOICE
You are Sophie Miller, a 40-year-old practical wellness and beauty guide writing from lived observation and repeated real-world experience.
Your voice is: calm, grounded, factual, empathetic, reflective, human. 
You never sound: promotional, sales-driven, exaggerated, persuasive.

Occasionally include subtle observational phrases such as:
"I’ve noticed over the years…", "From what I’ve seen in practice…", "One thing that often surprises people is…", "Over time, some patterns start to appear…"

GOAL
Write a 1,400–1,700 word educational guide optimized for ScribeHow and Parasite SEO.
The article must feel: native to the platform, instructional, thoughtful, written for humans first.
Avoid obvious SEO structure patterns. Use curly quotation marks (“ ”).

H1 TITLE
${h1}
(Use this H1 verbatim).

PRODUCT REFERENCE
${productName}
Rules:
- Mention exactly once in the entire article
- The mention must be in **bold**
- Place it naturally in the introduction (preferably paragraph 2)
- Reference it neutrally as an example of a supplement some people explore
- No endorsement, no urgency, no recommendation, no links.

CORE WRITING PRINCIPLES
- Human Variance: Vary sentence length.
- Narrative Naturalness: Reflective paragraphs (3-5 sentences max).
- Anti-Hype: No medical claims, no promises. Avoid "In conclusion", "Furthermore".
- Grounded Authority: Favor lived observation.

INTRODUCTION (180–220 words)
- Para 1: Context & Relatability (Aging/Maintenance).
- Para 2: Expectation Setting. Mention **${productName}** here neutrally.

STRUCTURE
- Internally select ONE primary structural lens (observational, habit-driven, biological, etc.)
- Design unique H2 structure (5–6 H2 sections total).
- MANDATORY H2: One H2 must present a 7-step daily integration workflow presented as a real-life scenario.
- CONTENT: Explore themes like structural proteins, natural production, supporting nutrients (Vit C, Zinc), timing, and lifestyle anchors.

KEY TAKEAWAYS
- 5–6 concise bullet points focused on realism.

FAQ SECTION
- 5–7 realistic questions (3–4 sentences each).
                `,
                stage2: (text) => `Rewrite the following text but make sure that EVERY H1, H2, and H3 header is formatted as **BOLD**. Ensure the text uses clear bullet points and bold formatting for important terms. Do not change the wording. Text: ${text}`,
                stage3: (text) => `Final quality check. Convert the text into a clean HTML structure. Wrap headings in <h1>, <h2>, or <h3>. Wrap paragraphs in <p>. Use <ul> and <li> for lists. Use <b> for bold text. Ensure the tone is calm and the formatting is professional for easy copy-pasting. Output only the HTML content. Text: ${text}`
            }
        ];

        // --- CORE ENGINE LOGIC ---
        const firebaseConfig = myCustomConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sophie-engine-v2';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let userUid = null;
        let environmentApiKey = "";

        // Initialize Firebase and Fetch Vercel Environment Key
        async function init() {
            // Fetch the key from your Vercel API route (/api/key.js)
            try {
                const response = await fetch('/api/key');
                if (response.ok) {
                    const data = await response.json();
                    if (data.key) {
                        environmentApiKey = data.key;
                        showStatus("Vercel Environment API Key Loaded", "emerald");
                    } else {
                        showStatus("API Key not found in Environment Variables", "yellow");
                    }
                } else {
                    showStatus("API Route /api/key not found (404). Create api/key.js", "red");
                }
            } catch (e) {
                showStatus("Error fetching Environment Key", "red");
            }

            try {
                const res = await signInAnonymously(auth);
                userUid = res.user.uid;
                updateKeywordUI();
            } catch(e) { 
                console.error("Firebase Auth failed.");
                const statusDiv = document.getElementById('engineStatus');
                statusDiv.innerText += " | Firebase Auth failed.";
            }
        }

        function showStatus(msg, color) {
            const statusDiv = document.getElementById('engineStatus');
            statusDiv.innerText = `System: ${msg}`;
            statusDiv.className = `text-[10px] font-bold uppercase tracking-[0.2em] mt-2 text-${color}-500`;
        }

        // AI call with exponential backoff
        async function callAI(prompt) {
            // Strictly uses the Environment Variable fetched during init
            if (!environmentApiKey) {
                throw new Error("Missing API Key. Ensure GOOGLE_API is set in Vercel and /api/key.js is deployed.");
            }

            const endpoint = apiEndpoints[Math.floor(Math.random() * apiEndpoints.length)];
            const url = `${endpoint}?key=${environmentApiKey}`;

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        if (response.status === 403) throw new Error("403 Forbidden: API key invalid or Gemini API not enabled.");
                        throw new Error(data.error?.message || "API Error");
                    }
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) {
                    if (i === 4 || e.message.includes("403")) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        // Copy HTML to Clipboard
        window.copyToClipboard = (elementId) => {
            const text = document.getElementById(elementId).value;
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            const btn = document.querySelector(`[onclick="copyToClipboard('${elementId}')"]`);
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.classList.replace('bg-slate-700', 'bg-emerald-600');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-emerald-600', 'bg-slate-700');
            }, 2000);
        };

        // Main Automation Process
        window.runAutomation = async () => {
            const count = parseInt(document.getElementById('count').value);
            const pName = document.getElementById('productName').value || "Advanced Collagen Plus";
            const log = document.getElementById('log');
            const btn = document.getElementById('btn');

            if (!count || count <= 0) return;
            if (!environmentApiKey) {
                alert("Cannot start: API Key from Vercel environment not loaded.");
                return;
            }

            btn.disabled = true;
            log.innerHTML = `<div class="text-indigo-400 animate-pulse font-mono text-sm mb-4">>> SOPHIE ENGINE ACTIVATED...</div>`;

            for (let i = 0; i < count; i++) {
                if (keywords.length === 0) break;

                const h1 = keywords.splice(Math.floor(Math.random() * keywords.length), 1)[0];
                const activePrompt = promptTemplates[0];
                const taskId = `task-${Date.now()}-${i}`;
                
                const card = document.createElement('div');
                card.className = "bg-slate-800/40 border border-slate-700/50 p-4 rounded-xl mb-4 text-xs font-mono transition-all";
                log.prepend(card);

                try {
                    card.innerHTML = `<div class="text-white font-bold mb-2 uppercase tracking-widest text-[10px] text-indigo-400">Task ${i+1}: ${h1}</div>`;
                    
                    card.innerHTML += `<div class="flex justify-between"><span>Generating Content...</span><span id="s1-${i}">⏳</span></div>`;
                    const s1 = await callAI(activePrompt.stage1(h1, pName));
                    document.getElementById(`s1-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between"><span>Bold Formatting...</span><span id="s2-${i}">⏳</span></div>`;
                    const s2 = await callAI(activePrompt.stage2(s1));
                    document.getElementById(`s2-${i}`).innerText = "✅";

                    card.innerHTML += `<div class="flex justify-between"><span>HTML Conversion...</span><span id="s3-${i}">⏳</span></div>`;
                    const finalHtml = await callAI(activePrompt.stage3(s2));
                    document.getElementById(`s3-${i}`).innerText = "✅";

                    // Save to Firebase Firestore
                    if (userUid) {
                        try {
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'articles'), {
                                h1, content: finalHtml, createdAt: serverTimestamp()
                            });
                        } catch(e) { console.error("Database save failed", e); }
                    }

                    // Display result with copy option
                    card.innerHTML += `
                        <div class="mt-4 space-y-2">
                            <textarea id="${taskId}" class="hidden">${finalHtml}</textarea>
                            <button onclick="copyToClipboard('${taskId}')" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                COPY HTML TO CLIPBOARD
                            </button>
                            <div class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter italic text-center">Saved to Cloud Storage</div>
                        </div>
                    `;
                    updateKeywordUI();
                } catch (e) {
                    card.innerHTML += `<div class="text-red-500 mt-2 font-bold uppercase tracking-tighter">!! ERROR: ${e.message}</div>`;
                }
            }
            btn.disabled = false;
        }

        function updateKeywordUI() {
            document.getElementById('kwTotal').innerText = keywords.length;
        }

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains+Mono', monospace; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-400 min-h-screen p-6">

    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Control Panel -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-500/10 blur-3xl rounded-full"></div>
                
                <h1 class="text-white text-3xl font-black tracking-tighter mb-2 italic uppercase">
                    Sophie <span class="text-indigo-500 tracking-normal">Miller</span>
                </h1>
                <div id="engineStatus" class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 mb-8 italic tracking-tighter">System: Syncing with Vercel...</div>

                <div class="space-y-4 relative z-10">
                    <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 focus-within:border-indigo-500/50 transition-all">
                        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-2 block">Iteration Count</label>
                        <input type="number" id="count" value="1" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>

                    <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 focus-within:border-indigo-500/50 transition-all">
                        <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-2 block">Target Product Name</label>
                        <input type="text" id="productName" value="Advanced Collagen Plus" class="bg-transparent text-lg font-bold text-indigo-400 w-full outline-none">
                    </div>

                    <div class="flex justify-between items-center py-4 border-y border-slate-800/30">
                        <span class="text-xs font-medium text-slate-500 uppercase tracking-wider">Remaining Queue:</span>
                        <span id="kwTotal" class="text-2xl font-black text-white mono tracking-tighter">0</span>
                    </div>

                    <button id="btn" onclick="runAutomation()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-6 rounded-2xl transition-all active:scale-[0.97] shadow-2xl shadow-indigo-900/40 flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                        Start Production
                    </button>
                </div>
            </div>

            <div class="p-6 bg-slate-900/50 border border-slate-800 rounded-2xl">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                    <h4 class="text-white text-[10px] font-bold uppercase tracking-widest italic text-indigo-400">Environment Sync</h4>
                </div>
                <p class="text-[11px] leading-relaxed text-slate-500 font-medium">
                    Automated Secure Link: Fetching <code class="text-indigo-300">GOOGLE_API</code> from your Vercel Environment Variables. Manual input has been removed for security.
                </p>
            </div>
        </div>

        <!-- Progress Feed -->
        <div class="lg:col-span-7">
            <div class="flex items-center justify-between mb-4 px-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Production Pipeline Feed</h2>
                </div>
                <span class="text-[9px] mono text-slate-600 uppercase">V2.6.0_ENV_STRICT</span>
            </div>
            
            <div id="log" class="h-[650px] overflow-y-auto custom-scroll pr-2 space-y-4">
                <div class="flex flex-col items-center justify-center h-full text-slate-800 select-none border-2 border-dashed border-slate-900 rounded-3xl">
                    <div class="w-12 h-12 border-2 border-slate-900 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                    <span class="mono text-[10px] uppercase tracking-[0.2em]">Awaiting command...</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
